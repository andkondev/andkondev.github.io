<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Andkon's Swim Timer</title>
  <link rel="icon" type="image/png" href="assets/swim-logo.png">
  <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
  <style>

:root {
  color-scheme: light;
  --page: #f6f8fa;
  --surface: #ffffff;
  --surface-2: #eef3f6;
  --surface-3: #f8fafb;
  --text: #121820;
  --muted: #657384;
  --border: #d8e0e7;
  --accent: #0877c9;
  --accent-strong: #075a99;
  --accent-soft: #e6f4fb;
  --control-bg: #111820;
  --control-bg-2: #1b2530;
  --control-fg: #f7fbff;
  --video-shell: #030507;
  --shadow: 0 16px 36px rgba(22, 35, 48, 0.1);
  --focus: #f2b84b;
  --radius: 8px;
  --gap: 14px;
  --shell-pad: 20px;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--page);
}

body {
  min-height: 100dvh;
  margin: 0;
  background: var(--page);
  color: var(--text);
  font-size: 15px;
  line-height: 1.45;
  letter-spacing: 0;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button,
input,
select {
  font: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

.app-shell {
  width: min(1120px, 100%);
  margin: 0 auto;
  padding: var(--shell-pad);
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 16px;
}

.brand {
  display: flex;
  align-items: center;
  min-width: 0;
  gap: 16px;
}

.swim-trigger {
  width: 70px;
  height: 70px;
  flex: 0 0 auto;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 25px;
  overflow: hidden;
  padding: 0;
  box-shadow: 0 4px 16px rgba(12, 24, 36, 0.07);
}

.swim-trigger:active {
  transform: translateY(1px);
}

.swim-trigger img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title-block {
  min-width: 0;
}

h1 {
  margin: 0;
  color: var(--text);
  font-size: 34px;
  font-weight: 720;
  letter-spacing: 0;
}

.subline {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 3px;
  color: var(--muted);
  font-size: 13px;
}

.draft-chip {
  display: inline-flex;
  min-height: 22px;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 2px 8px;
  background: var(--surface-3);
  color: var(--muted);
  font-size: 12px;
}

.header-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
}

.fx-control {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
}

.fx-control select {
  height: 38px;
  max-width: 170px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 34px 0 11px;
  background: var(--surface);
  color: var(--text);
}

.workspace {
  display: block;
}

.primary-stack {
  display: grid;
  gap: var(--gap);
}

.upload-area {
  display: grid;
  min-height: 118px;
  place-items: center;
  border: 1px dashed color-mix(in srgb, var(--border) 80%, var(--accent));
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
}

.upload-area:hover,
.upload-area.dragover {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.upload-area:active {
  transform: translateY(1px);
}

.upload-copy {
  display: grid;
  gap: 4px;
  justify-items: center;
  padding: 20px;
  text-align: center;
}

.upload-icon {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  border-radius: var(--radius);
  background: var(--surface-2);
  color: var(--accent);
  font-size: 22px;
}

.upload-title {
  color: var(--text);
  font-weight: 700;
}

.upload-meta {
  color: var(--muted);
  font-size: 13px;
}

#videoInput {
  display: none;
}

.video-container {
  display: none;
}

.video-container.active {
  display: block;
}

.help-text {
  display: none;
}

.video-player-wrapper {
  display: flex;
  justify-content: center;
}

.video-player {
  position: relative;
  display: inline-block;
  width: 100%;
  max-width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--video-shell);
  box-shadow: var(--shadow);
}

.video-wrapper {
  position: relative;
  overflow: hidden;
  background: #000;
}

video {
  display: block;
  width: 100%;
  max-height: calc(100dvh - 210px);
  min-height: 190px;
  background: #000;
  object-fit: contain;
}

.mark-overlay {
  position: absolute;
  inset: auto 0 0;
  z-index: 11;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 10px;
  pointer-events: none;
}

.set-btn-overlay {
  min-width: 116px;
  min-height: 46px;
  border: 1px solid rgba(255, 255, 255, 0.32);
  border-radius: var(--radius);
  padding: 0 15px;
  background: color-mix(in srgb, var(--accent) 88%, #000);
  color: #fff;
  cursor: pointer;
  font-weight: 760;
  pointer-events: auto;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
}

.set-btn-overlay:hover {
  background: var(--accent-strong);
}

.set-btn-overlay:active {
  transform: translateY(1px);
}

.overlay-timer {
  position: absolute;
  top: 12px;
  left: 50%;
  z-index: 10;
  display: none;
  transform: translateX(-50%);
  border-radius: var(--radius);
  padding: 5px 10px;
  background: rgba(0, 0, 0, 0.48);
  color: #fff;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  font-size: 22px;
  font-weight: 780;
  line-height: 1.1;
  text-shadow: 0 1px 2px #000;
}

.overlay-timer.visible {
  display: block;
}

.custom-controls {
  display: grid;
  gap: 10px;
  background: var(--control-bg);
  padding: 12px;
}

.progress-bar {
  position: relative;
  width: 100%;
  height: 9px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.24);
  cursor: pointer;
  touch-action: none;
  overflow: hidden;
}

.progress-filled {
  position: absolute;
  inset: 0 auto 0 0;
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: var(--accent);
  pointer-events: none;
  max-width: 100%;
}

.controls-row {
  display: grid;
  grid-template-columns: auto auto minmax(68px, auto) auto auto 1fr auto auto;
  align-items: center;
  gap: 7px;
}

.frame-btn,
.play-btn,
.timer-toggle,
.fullscreen-btn {
  display: inline-flex;
  min-width: 42px;
  height: 40px;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: var(--radius);
  background: var(--control-bg-2);
  color: var(--control-fg);
  cursor: pointer;
  font-weight: 720;
}

.frame-btn {
  gap: 4px;
  padding: 0 10px;
}

.frame-btn .arrow {
  font-size: 14px;
  line-height: 1;
}

.frame-btn .label {
  color: rgba(255, 255, 255, 0.72);
  font-size: 11px;
  line-height: 1;
}

.play-btn {
  min-width: 74px;
  padding: 0 14px;
}

.timer-toggle,
.fullscreen-btn {
  width: 42px;
  padding: 0;
  font-size: 17px;
}

.timer-toggle.active {
  border-color: color-mix(in srgb, var(--accent) 70%, #fff);
  background: var(--accent);
}

.controls-spacer {
  min-width: 4px;
}

.frame-btn:hover,
.play-btn:hover,
.timer-toggle:hover,
.fullscreen-btn:hover {
  border-color: rgba(255, 255, 255, 0.28);
  background: color-mix(in srgb, var(--control-bg-2) 68%, var(--accent));
}

.frame-btn:active,
.play-btn:active,
.fullscreen-btn:active,
.set-btn-overlay:active {
  background: var(--accent);
  transform: translateY(1px);
}

.draft-race .set-btn-overlay:active {
  color: #151200;
}

.timer-toggle:active {
  transform: translateY(1px);
}

@media (hover: none) {
  .set-btn-overlay:hover {
    background: color-mix(in srgb, var(--accent) 88%, #000);
  }

  .frame-btn:hover,
  .play-btn:hover,
  .timer-toggle:hover,
  .fullscreen-btn:hover {
    border-color: rgba(255, 255, 255, 0.14);
    background: var(--control-bg-2);
  }

  .timer-toggle.active:hover {
    border-color: color-mix(in srgb, var(--accent) 70%, #fff);
    background: var(--accent);
  }

  .advanced-toggle button:hover {
    color: var(--muted);
    background: transparent;
  }
}

.calculator-section {
  margin-top: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 14px;
  box-shadow: 0 8px 24px rgba(22, 35, 48, 0.06);
}

.calculator-section.has-video {
  border-color: color-mix(in srgb, var(--border) 74%, var(--accent));
}

.row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.row + .row {
  margin-top: 12px;
}

.field-block {
  min-width: 0;
}

.row label {
  display: block;
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 720;
}

.field {
  display: flex;
  width: 100%;
  min-height: 46px;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface-3);
  color: var(--text);
  padding: 10px 11px;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  font-size: 17px;
  font-weight: 650;
}

input.field {
  background: var(--surface);
}

input.field:focus,
.fx-control select:focus,
button:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--focus) 76%, transparent);
  outline-offset: 2px;
}

.output-field {
  color: var(--accent-strong);
}

.placeholder {
  color: var(--muted);
  font-style: normal;
  font-weight: 520;
}

.advanced-toggle {
  display: flex;
  justify-content: flex-end;
  margin-top: 11px;
}

.advanced-toggle button {
  display: inline-flex;
  min-height: 34px;
  align-items: center;
  gap: 7px;
  border: 0;
  border-radius: var(--radius);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  padding: 0 8px;
  font-size: 13px;
  font-weight: 700;
}

.advanced-toggle button:hover {
  color: var(--accent-strong);
  background: var(--surface-2);
}

.advanced-toggle .arrow {
  display: inline-block;
  transition: transform 160ms ease;
}

.advanced-toggle.open .arrow {
  transform: rotate(90deg);
}

.advanced-section {
  display: none;
  margin-top: 10px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

.advanced-section.open {
  display: block;
}

.tip-text {
  margin-bottom: 10px;
  color: var(--muted);
  font-size: 13px;
}

.tip-text .icon {
  margin-right: 5px;
}

.multiplier-fps {
  color: var(--muted);
  font-size: 12px;
  font-weight: 620;
}

.firework-particle {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  will-change: transform, opacity;
}

.controls-row.compact {
  gap: 5px;
}

.controls-row.compact .frame-btn .label {
  display: none;
}

.controls-row.compact .frame-btn {
  padding: 0 9px;
}

.controls-row.very-compact {
  grid-template-columns: auto auto minmax(56px, auto) auto auto 1fr auto auto;
  gap: 4px;
}

.controls-row.very-compact .frame-btn,
.controls-row.very-compact .timer-toggle,
.controls-row.very-compact .fullscreen-btn {
  min-width: 36px;
  width: 36px;
}

.controls-row.very-compact .play-btn {
  min-width: 58px;
  padding: 0 8px;
  font-size: 12px;
}

.video-player:fullscreen,
.video-player:-webkit-full-screen,
.video-player.is-pseudo-fullscreen {
  width: 100vw !important;
  max-width: none;
  height: 100dvh;
  border: 0;
  border-radius: 0;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  background: #000;
  overflow: hidden;
}

.video-player:fullscreen .video-wrapper,
.video-player:-webkit-full-screen .video-wrapper,
.video-player.is-pseudo-fullscreen .video-wrapper {
  display: flex;
  min-height: 0;
  align-items: center;
  justify-content: center;
}

.video-player:fullscreen video,
.video-player:-webkit-full-screen video,
.video-player.is-pseudo-fullscreen video {
  width: 100%;
  height: 100%;
  min-height: 0;
  max-height: none;
  object-fit: contain;
}

.video-player:fullscreen .custom-controls,
.video-player:-webkit-full-screen .custom-controls,
.video-player.is-pseudo-fullscreen .custom-controls {
  padding: 10px max(12px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
  background: rgba(9, 13, 18, 0.94);
}

.video-player:fullscreen .mark-overlay,
.video-player:-webkit-full-screen .mark-overlay,
.video-player.is-pseudo-fullscreen .mark-overlay {
  padding: 12px max(12px, env(safe-area-inset-right)) 12px max(12px, env(safe-area-inset-left));
}

.video-player:fullscreen .set-btn-overlay,
.video-player:-webkit-full-screen .set-btn-overlay,
.video-player.is-pseudo-fullscreen .set-btn-overlay {
  min-width: 126px;
  min-height: 48px;
  background: rgba(8, 119, 201, 0.92);
}

.video-player.is-pseudo-fullscreen {
  position: fixed;
  inset: 0;
  z-index: 9000;
}

body.pseudo-fullscreen-lock {
  overflow: hidden;
}

@media (orientation: portrait) and (max-width: 900px) {
  .video-player.is-pseudo-fullscreen.is-landscape-locked {
    top: 50%;
    left: 50%;
    width: 100dvh !important;
    height: 100dvw;
    transform: translate(-50%, -50%) rotate(90deg);
    transform-origin: center center;
  }
}

@media (pointer: coarse) {
  .custom-controls {
    padding: 14px 12px;
  }

  .progress-bar {
    height: 12px;
  }
}

@media (max-width: 760px) {
  :root {
    --shell-pad: 12px;
  }

  .app-header {
    align-items: flex-start;
    flex-direction: column;
  }

  .header-actions,
  .fx-control,
  .fx-control select {
    width: 100%;
  }

  .fx-control {
    justify-content: space-between;
  }

  .fx-control select {
    max-width: none;
  }

  .upload-area {
    min-height: 104px;
  }

  video {
    min-height: 170px;
    max-height: calc(100dvh - 250px);
  }

  .mark-overlay {
    padding: 8px;
  }

  .set-btn-overlay {
    min-width: 104px;
    min-height: 44px;
    padding: 0 12px;
  }

  .calculator-section {
    padding: 12px;
  }

  .row {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .field {
    min-height: 44px;
  }
}

@media (orientation: landscape) and (max-height: 520px) {
  :root {
    --shell-pad: 8px;
  }

  .app-header {
    align-items: center;
    flex-direction: row;
    margin-bottom: 8px;
  }

  .brand {
    gap: 8px;
  }

  .swim-trigger {
    width: 52px;
    height: 52px;
    font-size: 20px;
  }

  h1 {
    font-size: 26px;
  }

  .subline {
    display: none;
  }

  .header-actions {
    width: auto;
  }

  .fx-control {
    width: auto;
  }

  .fx-control select {
    width: 158px;
    max-width: 158px;
    height: 34px;
  }

  .upload-area {
    min-height: 46px;
  }

  .upload-copy {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    padding: 8px;
  }

  .upload-icon {
    width: 28px;
    height: 28px;
    font-size: 16px;
  }

  .upload-meta {
    display: none;
  }

  video {
    min-height: 120px;
    max-height: calc(100dvh - 210px);
  }

  .custom-controls {
    gap: 8px;
    padding: 8px 10px;
  }

  .calculator-section {
    margin-top: 10px;
  }
}

@media (max-width: 420px) {
  h1 {
    font-size: 26px;
  }

  .swim-trigger {
    width: 58px;
    height: 58px;
  }

  .controls-row {
    grid-template-columns: auto auto minmax(58px, auto) auto auto 1fr auto auto;
    gap: 4px;
  }

  .frame-btn,
  .timer-toggle,
  .fullscreen-btn {
    min-width: 36px;
    width: 36px;
  }

  .frame-btn {
    padding: 0 8px;
  }

  .play-btn {
    min-width: 58px;
    padding: 0 8px;
    font-size: 12px;
  }
}


.draft-lane {
  --page: #f7f9fb;
  --surface: #ffffff;
  --surface-2: #eef5f7;
  --surface-3: #f8fbfc;
  --text: #13202b;
  --muted: #627487;
  --border: #d7e2ea;
  --accent: #0877c9;
  --accent-strong: #075e9d;
  --accent-soft: #e7f4fb;
  --control-bg: #101820;
  --control-bg-2: #1c2834;
}

.draft-lane .app-shell {
  max-width: 940px;
}

.draft-dark {
  color-scheme: dark;
  --page: #111416;
  --surface: #191e22;
  --surface-2: #232b30;
  --surface-3: #151a1f;
  --text: #f2f6f8;
  --muted: #a3b0b9;
  --border: #303941;
  --accent: #2bb3c7;
  --accent-strong: #7adbe8;
  --accent-soft: #142a30;
  --control-bg: #070b0f;
  --control-bg-2: #172126;
  --video-shell: #030405;
  --shadow: 0 18px 42px rgba(0, 0, 0, 0.36);
  --focus: #e2b646;
}

.draft-dark .upload-area,
.draft-dark .calculator-section,
.draft-dark .swim-trigger,
.draft-dark .fx-control select {
  box-shadow: none;
}

.draft-dark .output-field {
  color: #7adbe8;
}

.draft-split {
  --page: #f5f7f7;
  --surface: #ffffff;
  --surface-2: #eef2f1;
  --surface-3: #f7f9f8;
  --text: #15201d;
  --muted: #66766f;
  --border: #d8e1dd;
  --accent: #0b7f68;
  --accent-strong: #075f4e;
  --accent-soft: #e4f4ef;
  --control-bg: #0f1818;
  --control-bg-2: #1b2b2a;
}

@media (min-width: 920px) {
  .draft-split .app-shell {
    width: min(1240px, 100%);
  }

  .draft-split .workspace {
    display: grid;
    grid-template-columns: minmax(0, 1.45fr) minmax(315px, 0.65fr);
    align-items: start;
    gap: 16px;
  }

  .draft-split .calculator-section {
    position: sticky;
    top: 18px;
    margin-top: 0;
  }

  .draft-split .row {
    grid-template-columns: 1fr;
  }
}

.draft-paper {
  --page: #fbfbfa;
  --surface: #ffffff;
  --surface-2: #f0f3f4;
  --surface-3: #fafafa;
  --text: #1c2126;
  --muted: #606b76;
  --border: #d9dedf;
  --accent: #2867b2;
  --accent-strong: #1f4f88;
  --accent-soft: #edf5fb;
  --control-bg: #16191d;
  --control-bg-2: #282e34;
}

.draft-paper .app-shell {
  max-width: 980px;
}

.draft-paper .app-header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}

.draft-paper .video-player,
.draft-paper .calculator-section,
.draft-paper .upload-area {
  box-shadow: none;
}

.draft-paper .calculator-section {
  border-left: 5px solid var(--accent);
}

.draft-dock {
  --page: #f4f7f8;
  --surface: #ffffff;
  --surface-2: #eef4f5;
  --surface-3: #f7fafb;
  --text: #151b1f;
  --muted: #62717a;
  --border: #d5e0e4;

  <script>
// Video handling
const uploadArea = document.getElementById('uploadArea');
const videoInput = document.getElementById('videoInput');
const videoContainer = document.getElementById('videoContainer');
const videoPlayer = document.getElementById('videoPlayer');
const video = document.getElementById('video');
const setStartBtn = document.getElementById('setStartBtn');
const setEndBtn = document.getElementById('setEndBtn');
const playBtn = document.getElementById('playBtn');
const progressBar = document.getElementById('progressBar');
const progressFilled = document.getElementById('progressFilled');
const framePrevBtn = document.getElementById('framePrevBtn');
const frameNextBtn = document.getElementById('frameNextBtn');
const framePrev10Btn = document.getElementById('framePrev10Btn');
const frameNext10Btn = document.getElementById('frameNext10Btn');
const calculatorSection = document.getElementById('calculatorSection');
const overlayTimer = document.getElementById('overlayTimer');
const timerToggle = document.getElementById('timerToggle');
const multiplierFps = document.getElementById('multiplierFps'); // Shows detected FPS in multiplier label

// Frame duration - now a variable that can be updated by FPS detection
let FRAME_DURATION = 1 / 30; // Default 30fps
const DEFAULT_FPS = 30;

// Upload handling
uploadArea.addEventListener('click', () => videoInput.click());
uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
});
uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('video/')) {
        loadVideo(file);
    }
});
videoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) loadVideo(file);
});

function loadVideo(file) {
    const url = URL.createObjectURL(file);
    video.src = url;
    videoContainer.classList.add('active');
    calculatorSection.classList.add('has-video');
    
    // Reset progress bar and time display for new video
    progressFilled.style.width = '0%';
    overlayTimer.textContent = '0:00.000';
    
    // Clear all calculator fields on new video upload
    document.getElementById('start').value = '';
    document.getElementById('end').value = '';
    document.getElementById('recorded').innerHTML = '<span class="placeholder">—</span>';
    document.getElementById('real').innerHTML = '<span class="placeholder">—</span>';
    document.getElementById('rounded').innerHTML = '<span class="placeholder">—</span>';
    
    // Reset FPS to default before detection
    FRAME_DURATION = 1 / DEFAULT_FPS;
    multiplierFps.textContent = '';
    document.getElementById('multiplier').value = ''; // Reset multiplier for new video
    
    // Try to detect FPS and multiplier from file
    detectVideoMetadata(file);
    
    video.load();
    
    video.addEventListener('loadedmetadata', constrainVideoSize, {once: true});
}

// ============================================================
// MP4BOX.JS METADATA DETECTION - START OF REMOVABLE FEATURE
// Detects: playback FPS, capture FPS (Android), calculates multiplier
// ============================================================
function detectVideoMetadata(file) {
    // Check if MP4Box is available
    if (typeof MP4Box === 'undefined') {
        console.log('MP4Box not available, using default FPS');
        multiplierFps.textContent = `(${DEFAULT_FPS}fps)`;
        return;
    }
    
    // Only process MP4/MOV files
    const validTypes = ['video/mp4', 'video/quicktime', 'video/x-m4v'];
    if (!validTypes.includes(file.type) && !file.name.match(/\.(mp4|mov|m4v)$/i)) {
        console.log('Not an MP4/MOV file, using default FPS');
        multiplierFps.textContent = `(${DEFAULT_FPS}fps)`;
        return;
    }
    
    const mp4boxFile = MP4Box.createFile();
    let metadataFound = false;
    
    mp4boxFile.onReady = function(info) {
        if (metadataFound) return; // Prevent duplicate processing
        metadataFound = true;
        
        console.log('MP4Box info:', info);
        
        // Try to find video track - check both videoTracks and tracks arrays
        let videoTrack = null;
        
        if (info.videoTracks && info.videoTracks.length > 0) {
            videoTrack = info.videoTracks[0];
        } else if (info.tracks && info.tracks.length > 0) {
            // Find first video track in tracks array
            videoTrack = info.tracks.find(t => t.video || (t.type === 'video'));
        }
        
        let playbackFPS = DEFAULT_FPS;
        
        if (videoTrack) {
            console.log('Video track found:', videoTrack);
            
            // Check if we have valid duration and samples
            const nbSamples = videoTrack.nb_samples;
            const duration = videoTrack.duration;
            const timescale = videoTrack.timescale;
            
            console.log(`nb_samples: ${nbSamples}, duration: ${duration}, timescale: ${timescale}`);
            
            // Validate we have the data needed
            if (nbSamples && duration && timescale && duration !== 0) {
                // Calculate FPS: (number of samples * timescale) / duration
                const fps = (nbSamples * timescale) / duration;
                
                console.log(`Calculated raw FPS: ${fps}`);
                
                // Validate FPS is reasonable (between 1 and 300)
                if (isFinite(fps) && !isNaN(fps) && fps >= 1 && fps <= 300) {
                    playbackFPS = roundToCommonFPS(fps);
                    console.log(`Detected FPS: ${fps.toFixed(3)}, rounded to: ${playbackFPS}`);
                }
            }
        }
        
        // Update frame duration
        FRAME_DURATION = 1 / playbackFPS;
        
        // Try to extract capture FPS from metadata (Android stores this in udta)
        let captureFPS = null;
        try {
            captureFPS = extractCaptureFPS(mp4boxFile, info);
        } catch (e) {
            console.log('Could not extract capture FPS:', e);
        }
        
        if (captureFPS && captureFPS > playbackFPS) {
            // Slow-mo video detected
            const multiplier = Math.round(captureFPS / playbackFPS);
            console.log(`Capture FPS: ${captureFPS}, Playback FPS: ${playbackFPS}, Multiplier: ${multiplier}`);
            
            // Auto-set multiplier and show fps info
            document.getElementById('multiplier').value = multiplier;
            multiplierFps.textContent = `(${captureFPS}fps → ${playbackFPS}fps)`;
        } else {
            // Regular video (not slow-mo) - set multiplier to 1
            console.log(`Regular video detected: ${playbackFPS}fps, setting multiplier to 1`);
            document.getElementById('multiplier').value = 1;
            multiplierFps.textContent = `(${playbackFPS}fps)`;
        }
        
        // Recalculate if times are set
        calculate();
    };
    
    mp4boxFile.onError = function(e) {
        console.log('MP4Box error:', e);
        multiplierFps.textContent = `(${DEFAULT_FPS}fps)`;
    };
    
    // Read both beginning and end of file to find moov box
    // (Some files have moov at the end, especially phone recordings)
    const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB
    
    if (file.size <= CHUNK_SIZE * 2) {
        // File is small enough to read entirely
        const reader = new FileReader();
        reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            arrayBuffer.fileStart = 0;
            mp4boxFile.appendBuffer(arrayBuffer);
            mp4boxFile.flush();
        };
        reader.readAsArrayBuffer(file);
    } else {
        // Read beginning first
        const readerStart = new FileReader();
        readerStart.onload = function(e) {
            const arrayBuffer = e.target.result;
            arrayBuffer.fileStart = 0;
            mp4boxFile.appendBuffer(arrayBuffer);
            
            // If moov wasn't at the start, try the end
            if (!metadataFound) {
                const readerEnd = new FileReader();
                readerEnd.onload = function(e) {
                    const arrayBuffer = e.target.result;
                    arrayBuffer.fileStart = file.size - CHUNK_SIZE;
                    mp4boxFile.appendBuffer(arrayBuffer);
                    mp4boxFile.flush();
                    
                    // If still not found, show default
                    setTimeout(() => {
                        if (!metadataFound) {
                            console.log('Moov box not found in file, using default FPS');
                            multiplierFps.textContent = `(${DEFAULT_FPS}fps)`;
                        }
                    }, 100);
                };
                const endBlob = file.slice(file.size - CHUNK_SIZE);
                readerEnd.readAsArrayBuffer(endBlob);
            }
        };
        const startBlob = file.slice(0, CHUNK_SIZE);
        readerStart.readAsArrayBuffer(startBlob);
    }
}

// Extract capture FPS from metadata (primarily for Android slow-mo files)
function extractCaptureFPS(mp4boxFile, info) {
    // Try to get udta boxes which contain metadata
    try {
        const udtaBoxes = mp4boxFile.getBoxes('udta');
        console.log('UDTA boxes found:', udtaBoxes);
        
        if (udtaBoxes && udtaBoxes.length > 0) {
            for (const udta of udtaBoxes) {
                // Look for Android capture fps metadata
                const captureFPS = searchForCaptureFPS(udta);
                if (captureFPS) {
                    return captureFPS;
                }
            }
        }
        
        // Also try to get meta boxes directly
        const metaBoxes = mp4boxFile.getBoxes('meta');
        console.log('META boxes found:', metaBoxes);
        if (metaBoxes && metaBoxes.length > 0) {
            for (const meta of metaBoxes) {
                const captureFPS = searchForCaptureFPS(meta);
                if (captureFPS) {
                    return captureFPS;
                }
            }
        }
        
        // Try to get the raw file data and search for the pattern
        // This is a fallback for when the box parsing doesn't expose the data
        if (mp4boxFile.moov) {
            console.log('Searching moov box for capture FPS...');
            const captureFPS = searchMoovForCaptureFPS(mp4boxFile.moov);
            if (captureFPS) {
                return captureFPS;
            }
        }
    } catch (e) {
        console.log('Error accessing metadata boxes:', e);
    }
    
    return null;
}

// Search the moov box structure for capture FPS
function searchMoovForCaptureFPS(moov) {
    if (!moov) return null;
    
    // Look for udta within moov
    if (moov.udta) {
        const result = searchForCaptureFPS(moov.udta);
        if (result) return result;
    }
    
    // Look through all tracks
    if (moov.traks) {
        for (const trak of moov.traks) {
            if (trak.udta) {
                const result = searchForCaptureFPS(trak.udta);
                if (result) return result;
            }
        }
    }
    
    return null;
}

// Recursively search through box structure for capture FPS
function searchForCaptureFPS(box) {
    if (!box) return null;
    
    // Check if this box has data that might contain capture fps
    if (box.data) {
        const result = parseCaptureFPSFromData(box.data);
        if (result) return result;
    }
    
    // Check for ArrayBuffer or Uint8Array directly on the box
    if (box instanceof ArrayBuffer || box instanceof Uint8Array) {
        const result = parseCaptureFPSFromData(box);
        if (result) return result;
    }
    
    // Check for buffer property (mp4box.js often stores data here)
    if (box.buffer) {
        const result = parseCaptureFPSFromData(box.buffer);
        if (result) return result;
    }
    
    // Recursively check child boxes
    if (box.boxes && Array.isArray(box.boxes)) {
        for (const childBox of box.boxes) {
            const result = searchForCaptureFPS(childBox);
            if (result) return result;
        }
    }
    
    // Check common child properties
    const childProps = ['entries', 'items', 'children', 'values', 'keys', 'meta', 'ilst', 'keys_list', 'data_list'];
    for (const prop of childProps) {
        if (box[prop]) {
            if (Array.isArray(box[prop])) {
                for (const child of box[prop]) {
                    const result = searchForCaptureFPS(child);
                    if (result) return result;
                }
            } else if (typeof box[prop] === 'object') {
                const result = searchForCaptureFPS(box[prop]);
                if (result) return result;
            }
        }
    }
    
    // Check all object properties for nested data
    for (const key in box) {
        if (box.hasOwnProperty(key) && typeof box[key] === 'object' && box[key] !== null) {
            if (!['boxes', 'entries', 'items', 'children', 'values', 'keys'].includes(key)) {
                const result = searchForCaptureFPS(box[key]);
                if (result) return result;
            }
        }
    }
    
    return null;
}

// Parse binary data looking for capture FPS
function parseCaptureFPSFromData(data) {
    try {
        let bytes;
        if (data instanceof ArrayBuffer) {
            bytes = new Uint8Array(data);
        } else if (data instanceof Uint8Array) {
            bytes = data;
        } else if (data.buffer instanceof ArrayBuffer) {
            bytes = new Uint8Array(data.buffer);
        } else {
            return null;
        }
        
        // Try to decode as text and look for patterns
        const decoder = new TextDecoder('utf-8', { fatal: false });
        const text = decoder.decode(bytes);
        
        // Log what we find for debugging
        if (text.toLowerCase().includes('capture') || text.toLowerCase().includes('fps') || text.includes('240') || text.includes('120')) {
            console.log('Potential capture FPS data found in text:', text.substring(0, 500));
        }
        
        // Look for com.android.capture.fps in the text
        const captureFpsIndex = text.indexOf('com.android.capture.fps');
        if (captureFpsIndex !== -1) {
            console.log('Found com.android.capture.fps at index:', captureFpsIndex);
            
            // Samsung stores the value in an ilst/data structure after the key
            // The float value (0x43 0x70 0x00 0x00 = 240.0) appears later in the data
            // Search the ENTIRE remaining buffer for known float patterns
            
            // 240.0 as big-endian float: 0x43 0x70 0x00 0x00
            // 120.0 as big-endian float: 0x42 0xF0 0x00 0x00
            // 480.0 as big-endian float: 0x43 0xF0 0x00 0x00
            // 960.0 as big-endian float: 0x44 0x70 0x00 0x00
            
            const knownFloats = [
                { bytes: [0x43, 0x70, 0x00, 0x00], value: 240 },
                { bytes: [0x42, 0xF0, 0x00, 0x00], value: 120 },
                { bytes: [0x43, 0xF0, 0x00, 0x00], value: 480 },
                { bytes: [0x44, 0x70, 0x00, 0x00], value: 960 },
            ];
            
            // Search from after the key to end of data
            for (let i = captureFpsIndex; i < bytes.length - 3; i++) {
                for (const known of knownFloats) {
                    if (bytes[i] === known.bytes[0] && 
                        bytes[i+1] === known.bytes[1] &&
                        bytes[i+2] === known.bytes[2] &&
                        bytes[i+3] === known.bytes[3]) {
                        console.log(`Found ${known.value}fps float pattern at offset ${i}`);
                        return known.value;
                    }
                }
            }
            
            // Also check for partial match (sometimes trailing zeros are different)
            // 0x43 0x70 = start of 240.0
            for (let i = captureFpsIndex; i < bytes.length - 1; i++) {
                if (bytes[i] === 0x43 && bytes[i+1] === 0x70) {
                    console.log(`Found 240fps partial float pattern (0x43 0x70) at offset ${i}`);
                    return 240;
                }
                if (bytes[i] === 0x42 && bytes[i+1] === 0xF0) {
                    console.log(`Found 120fps partial float pattern (0x42 0xF0) at offset ${i}`);
                    return 120;
                }
            }
        }
        
        // Even if we didn't find the key, search entire buffer for float patterns
        // This handles cases where the key might be in a different box
        const knownFloats = [
            { bytes: [0x43, 0x70], value: 240 },  // 240.0 start
            { bytes: [0x42, 0xF0], value: 120 },  // 120.0 start
        ];
        
        // Only do this if we see "capture" or "fps" somewhere in the text
        if (text.toLowerCase().includes('capture.fps') || text.toLowerCase().includes('capturefps')) {
            for (let i = 0; i < bytes.length - 1; i++) {
                for (const known of knownFloats) {
                    if (bytes[i] === known.bytes[0] && bytes[i+1] === known.bytes[1]) {
                        console.log(`Found ${known.value}fps float pattern at offset ${i} (full scan)`);
                        return known.value;
                    }
                }
            }
        }
        
        // Look for Android capture fps patterns in text as fallback
        const patterns = [
            /com\.android\.capture\.fps[^\d]*(\d+)/i,
            /android[._]?capture[._]?fps[^\d]*(\d+)/i,
            /capture[._]?fps[^\d]*(\d+)/i,
            /"?capture_?fps"?[:\s=]*(\d+)/i,
        ];
        
        for (const pattern of patterns) {
            const match = text.match(pattern);
            if (match && match[1]) {
                const fps = parseInt(match[1], 10);
                if (fps >= 60 && fps <= 960) {
                    console.log(`Found capture FPS via pattern "${pattern}": ${fps}`);
                    return fps;
                }
            }
        }
        
    } catch (e) {
        console.log('Error parsing capture FPS data:', e);
    }
    
    return null;
}

function roundToCommonFPS(fps) {
    // Common frame rates to snap to
    const commonRates = [24, 25, 30, 48, 50, 60, 120, 240];
    
    // Find the closest common rate
    let closest = commonRates[0];
    let minDiff = Math.abs(fps - closest);
    
    for (const rate of commonRates) {
        const diff = Math.abs(fps - rate);
        if (diff < minDiff) {
            minDiff = diff;
            closest = rate;
        }
    }
    
    // Only snap if within 5% of a common rate
    if (minDiff / closest < 0.05) {
        return closest;
    }
    
    // Otherwise round to nearest integer
    return Math.round(fps);
}

// Progress bar seeking - with drag support (mouse and touch)
let isDragging = false;
let lastSeekTime = 0;
const SEEK_THROTTLE = 16; // ~60 updates per second for smooth UI

function seekToPosition(e) {
    const rect = progressBar.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    
    // Update visual immediately for smooth feedback
    progressFilled.style.width = (pos * 100) + '%';
    
    // Throttle actual video seeking for performance
    const now = Date.now();
    if (now - lastSeekTime > SEEK_THROTTLE) {
        video.currentTime = pos * video.duration;
        lastSeekTime = now;
    }
}

// Calculator functions
function timeToMs(timeStr) {
    timeStr = timeStr.trim();
    if (!timeStr) throw new Error("Empty");
    const parts = timeStr.split(':');
    let minutes = 0;
    let secAndMs;
    if (parts.length === 2) {
        minutes = parseInt(parts[0], 10);
        secAndMs = parts[1];
    } else if (parts.length === 1) {
        secAndMs = parts[0];
    } else {
        throw new Error("Invalid format");
    }
    
    const secMsParts = secAndMs.split('.');
    const seconds = parseInt(secMsParts[0], 10);
    
    if (parts.length === 2 && secMsParts[0].length !== 2) {
        throw new Error("Invalid format - seconds must be 2 digits");
    }
    
    if (seconds > 59) {
        throw new Error("Invalid format - seconds must be 0-59");
    }
    
    let ms = 0;
    if (secMsParts.length === 2) {
        const fractional = secMsParts[1] ? parseFloat('0.' + secMsParts[1]) : 0;
        ms = fractional * 1000;
    } else if (secMsParts.length > 2) {
        throw new Error("Invalid format");
    }
    
    if (isNaN(minutes) || isNaN(seconds) || isNaN(ms)) {
        throw new Error("Invalid numbers");
    }
    return (minutes * 60 * 1000) + (seconds * 1000) + ms;
}

function msToTime(ms) {
    if (ms <= 0) return "0:00.000";
    const totalSeconds = ms / 1000;
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds - (minutes * 60);
    
    const secsFloored = Math.floor(seconds * 1000) / 1000;
    const secsPart = secsFloored.toFixed(3);
    const [wholeSeconds, msStr] = secsPart.split('.');
    
    return `${minutes}:${wholeSeconds.padStart(2, '0')}.${msStr}`;
}

function msToHundredths(ms) {
    if (ms <= 0) return "0:00.00";
    const totalSeconds = Math.floor(ms / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    const hundredths = Math.floor((ms % 1000) / 10);
    if (minutes > 0) {
        return `${minutes}:${seconds.toString().padStart(2, '0')}.${hundredths.toString().padStart(2, '0')}`;
    } else {
        return `${seconds}.${hundredths.toString().padStart(2, '0')}`;
    }
}

function calculate() {
    const startInput = document.getElementById('start').value.trim();
    const endInput = document.getElementById('end').value.trim();
    const multiplierInput = document.getElementById('multiplier').value;
    // Use 1 as default if empty
    const multiplier = multiplierInput ? (parseFloat(multiplierInput) || 1) : 1;

    const recordedEl = document.getElementById('recorded');
    const realEl = document.getElementById('real');
    const roundedEl = document.getElementById('rounded');

    recordedEl.innerHTML = '<span class="placeholder">—</span>';
    realEl.innerHTML = '<span class="placeholder">—</span>';
    roundedEl.innerHTML = '<span class="placeholder">—</span>';

    if (!startInput || !endInput) {
        return;
    }

    const startParts = startInput.split(':');
    const endParts = endInput.split(':');
    const startLooksComplete = startParts.length === 2 && startParts[1] && startParts[1].length >= 2;
    const endLooksComplete = endParts.length === 2 && endParts[1] && endParts[1].length >= 2;

    if (!startLooksComplete || !endLooksComplete) {
        return;
    }

    try {
        const startMs = timeToMs(startInput);
        const endMs = timeToMs(endInput);

        if (endMs <= startMs) {
            return;
        }

        const recordedMs = endMs - startMs;
        const realMs = recordedMs / multiplier;
        const roundedMs = Math.round(realMs / 10) * 10;

        recordedEl.textContent = msToTime(recordedMs);
        realEl.textContent = msToTime(realMs);
        roundedEl.textContent = msToHundredths(roundedMs);
    } catch (e) {
        // Silent fail - just don't compute
    }
}

// Fireworks effect
let fireworksInterval = null;
let particles = [];

function createFirework(x, y) {
    const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#ff1493'];
    const particleCount = 30 + Math.floor(Math.random() * 20);
    
    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'fixed';
        particle.style.width = '4px';
        particle.style.height = '4px';
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.opacity = '1';
        particle.style.pointerEvents = 'none';
        particle.style.zIndex = '9999';
        particle.style.borderRadius = '50%';
        document.body.appendChild(particle);
        
        const angle = (Math.PI * 2 * i) / particleCount;
        const velocity = 2 + Math.random() * 3;
        const vx = Math.cos(angle) * velocity;
        const vy = Math.sin(angle) * velocity;
        
        const startTime = Date.now();
        const duration = 1000 + Math.random() * 500;
        
        const animate = () => {
            const elapsed = Date.now() - startTime;
            const progress = elapsed / duration;
            
            if (progress < 1) {
                const currentX = x + vx * elapsed * 0.1;
                const currentY = y + vy * elapsed * 0.1 + (progress * progress * 200);
                particle.style.left = currentX + 'px';
                particle.style.top = currentY + 'px';
                particle.style.opacity = 1 - progress;
                requestAnimationFrame(animate);
            } else {
                particle.remove();
                particles = particles.filter(p => p !== particle);
            }
        };
        
        animate();
        particles.push(particle);
    }
}

function startFireworks() {
    if (fireworksInterval) return;
    
    const launch = () => {
        const x = Math.random() * window.innerWidth;
        const y = 100 + Math.random() * 200;
        createFirework(x, y);
    };
    
    launch();
    fireworksInterval = setInterval(launch, 400);
}

function stopFireworks() {
    if (fireworksInterval) {
        clearInterval(fireworksInterval);
        fireworksInterval = null;
    }
    
    particles.forEach(particle => {
        const startOpacity = parseFloat(particle.style.opacity);
        const startTime = Date.now();
        
        const fade = () => {
            const elapsed = Date.now() - startTime;
            const progress = elapsed / 1000;
            
            if (progress < 1) {
                particle.style.opacity = startOpacity * (1 - progress);
                requestAnimationFrame(fade);
            } else {
                particle.remove();
            }
        };
        
        fade();
    });
    
    particles = [];
}

    }

    function currentMode() {
        return fireworkSelect ? fireworkSelect.value : 'confetti';
    }

    createFirework = function (x, y) {
        const mode = currentMode();
        const colors = palettes[mode] || palettes.classic;

        if (mode === 'comets') {
            for (let i = 0; i < 13; i++) {
                const startX = rand(0, window.innerWidth);
                const startY = rand(-60, 80);
                const drift = rand(-80, 80);
                const fall = rand(180, 420);
                const size = rand(3, 6);
                const color = pick(colors);
                spawnParticle({
                    size,
                    height: rand(16, 32),
                    radius: '999px',
                    color: 'linear-gradient(' + color + ', rgba(255,255,255,0))',
                    duration: rand(850, 1400),
                    render(particle, progress) {
                        const ease = progress * progress;
                        particle.style.transform = 'translate(' + (startX + drift * progress) + 'px,' + (startY + fall * ease) + 'px) rotate(24deg)';
                        particle.style.opacity = String(1 - progress);
                    },
                });
            }
            return;
        }

        if (mode === 'rings') {
            const count = 42;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
                const radius = i % 2 === 0 ? rand(90, 150) : rand(42, 78);
                const color = pick(colors);
                spawnParticle({
                    size: i % 5 === 0 ? 6 : 4,
                    color,
                    glow: true,
                    duration: rand(900, 1350),
                    render(particle, progress) {
                        const eased = 1 - Math.pow(1 - progress, 3);
                        const px = x + Math.cos(angle) * radius * eased;
                        const py = y + Math.sin(angle) * radius * eased + progress * 42;
                        particle.style.transform = 'translate(' + px + 'px,' + py + 'px)';
                        particle.style.opacity = String(1 - progress);
                    },
                });
            }
            return;
        }

        if (mode === 'fountain') {
            const originX = x || window.innerWidth / 2;
            const originY = window.innerHeight - 42;
            for (let i = 0; i < 16; i++) {
                const angle = rand(-Math.PI * 0.82, -Math.PI * 0.18);
                const speed = rand(120, 280);
                const color = pick(colors);
                spawnParticle({
                    size: rand(3, 6),
                    color,
                    glow: true,
                    duration: rand(760, 1200),
                    render(particle, progress) {
                        const px = originX + Math.cos(angle) * speed * progress;
                        const py = originY + Math.sin(angle) * speed * progress + 210 * progress * progress;
                        particle.style.transform = 'translate(' + px + 'px,' + py + 'px)';
                        particle.style.opacity = String(1 - progress);
                    },
                });
            }
            return;
        }

        if (mode === 'confetti') {
            for (let i = 0; i < 56; i++) {
                const angle = rand(0, Math.PI * 2);
                const distance = rand(60, 230);
                const rotate = rand(-260, 260);
                const color = pick(colors);
                spawnParticle({
                    size: rand(5, 9),
                    height: rand(3, 8),
                    radius: '2px',
                    color,
                    duration: rand(900, 1500),
                    render(particle, progress) {
                        const eased = 1 - Math.pow(1 - progress, 2);
                        const px = x + Math.cos(angle) * distance * eased;
                        const py = y + Math.sin(angle) * distance * eased + 180 * progress * progress;
                        particle.style.transform = 'translate(' + px + 'px,' + py + 'px) rotate(' + rotate * progress + 'deg)';
                        particle.style.opacity = String(1 - progress);
                    },
                });
            }
            return;
        }

        const count = 34 + Math.floor(Math.random() * 18);
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count;
            const velocity = rand(80, 230);
            const color = pick(colors);
            spawnParticle({
                size: rand(3, 6),
                color,
                glow: true,
                duration: rand(900, 1400),
                render(particle, progress) {
                    const px = x + Math.cos(angle) * velocity * progress;
                    const py = y + Math.sin(angle) * velocity * progress + 160 * progress * progress;
                    particle.style.transform = 'translate(' + px + 'px,' + py + 'px)';
                    particle.style.opacity = String(1 - progress);
                },
            });
        }
    };

    startFireworks = function () {
        if (fireworksInterval) return;

        const launch = () => {
            const mode = currentMode();
            const x = mode === 'fountain' ? window.innerWidth / 2 + rand(-90, 90) : rand(60, Math.max(80, window.innerWidth - 60));
            const y = mode === 'fountain' ? window.innerHeight - 42 : rand(90, Math.max(130, window.innerHeight * 0.45));
            createFirework(x, y);
        };

        launch();
        const interval = currentMode() === 'fountain' ? 180 : currentMode() === 'comets' ? 520 : 430;
        fireworksInterval = setInterval(launch, interval);
    };

    stopFireworks = function () {
        if (fireworksInterval) {
            clearInterval(fireworksInterval);
            fireworksInterval = null;
        }

        particles.forEach(particle => {
            particle.remove();
        });
        particles = [];
    };

    if (fireworkSelect) {
        fireworkSelect.addEventListener('change', () => {
            if (fireworksInterval) {
                stopFireworks();
                startFireworks();
            }
        });
    }

    try {
        const params = new URLSearchParams(window.location.search);
        if (params.has('preview')) {
            videoContainer.classList.add('active');
            calculatorSection.classList.add('has-video');
            overlayTimer.classList.add('visible');
            progressFilled.style.width = '38%';
            document.getElementById('start').value = '0:12.384';
            document.getElementById('end').value = '0:25.917';
            document.getElementById('multiplier').value = '1';
            calculate();
        }
    } catch (error) {}
})();

  </script>
</body>
</html>
